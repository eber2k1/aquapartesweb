    <style>
      /* Cargar fuentes de forma asíncrona */
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
      
      /* Fuentes de respaldo para evitar FOIT/FOUT */
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        line-height: 1.6;
        color: #1f2937;
      }
      
      /* Usar fuente del sistema hasta que cargue Inter */
      .fonts-loaded body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      }
    </style>
    
    <!-- Título de la página -->

    <!-- Script para carga óptima de fuentes -->
    <script>
      // Cargar fuentes de manera asíncrona
      function loadFonts() {
        const link = document.createElement('link');
        link.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap';
        link.rel = 'stylesheet';
        link.onload = function() {
          document.documentElement.classList.add('fonts-loaded');
        };
        document.head.appendChild(link);
      }
      
      // Cargar después de que el contenido crítico esté listo
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadFonts);
      } else {
        loadFonts();
      }
    </script>
