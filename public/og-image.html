<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaPartes - Especialistas en Tratamiento de Agua</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f9ff;
            font-family: Arial, sans-serif;
        }
        .og-container {
            width: 1200px;
            height: 630px;
            display: flex;
            overflow: hidden;
            position: relative;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .og-content {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: linear-gradient(135deg, #0ea5e9 0%, #0c4a6e 100%);
            color: white;
        }
        .og-logo {
            max-width: 200px;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 48px;
            margin: 0 0 20px 0;
            line-height: 1.2;
        }
        p {
            font-size: 24px;
            margin: 0;
            opacity: 0.9;
        }
        .og-image {
            flex: 1;
            background-color: #f8fafc;
            background-image: url('/aquapartes-icon.png');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
        }
    </style>
</head>
<body>
    <div class="og-container">
        <div class="og-content">
            <img src="/aquapartes-icon.png" alt="AquaPartes Logo" class="og-logo">
            <h1>AquaPartes</h1>
            <p>Especialistas en Tratamiento de Agua</p>
            <p style="margin-top: 20px; font-size: 20px;">+29 años de experiencia en soluciones profesionales</p>
        </div>
        <div class="og-image"></div>
    </div>
</body>
</html>
